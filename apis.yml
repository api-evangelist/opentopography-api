aid: opentopography-api
name: OpenTopography API
description: >-
  OpenTopography API is a web service that provides users with access to
  high-resolution topographic data and tools for analysis and visualization.
  The API allows users to query a vast collection of LiDAR and other
  topographic data from around the world, making it easier for researchers,
  engineers, and scientists to study the Earth's surface and its features.
