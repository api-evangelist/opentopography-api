apis:
  - aid: opentopography-api:opentopography-api
    name: OpenTopography API
    description: >-
      Access global and regional topographic raster datasets including SRTM,
      ALOS World 3D, NASADEM, Copernicus DSM, USGS 3DEP DEMs (1m, 10m, 30m),
      and bathymetry products. Provides programmatic retrieval of digital
      elevation models for analysis, visualization, and downstream geospatial
      workflows. Quotas vary by dataset; the 1m USGS DEM is restricted to
      academic users.
    humanURL: https://portal.opentopography.org/apidocs
